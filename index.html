<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Editor — MineLite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="title-group">
      <h1>Skin Editor</h1>
      <span>Minecraft · Java 64×64</span>
    </div>
    <div class="header-actions">
      <input type="file" id="import" accept="image/png" hidden>
      <input type="file" id="import-image" accept="image/*" hidden>
      <button id="import-img-btn">Importar imagen</button>
      <button id="import-btn">Importar Skin</button>
      <button id="export-btn" class="primary">Exportar Skin</button>
    </div>
  </header>

  <div class="layout">
    <aside class="editor-pane">
      <div class="tools">
        <button data-tool="pencil" class="tool active" title="Lápiz">✏️</button>
        <button data-tool="eraser" class="tool" title="Borrador">🧽</button>
        <button data-tool="eyedropper" class="tool" title="Cuentagotas">💧</button>
        <button data-tool="fill" class="tool" title="Relleno">🪣</button>
      </div>

      <div class="color-row">
        <input type="color" id="color" value="#A97C50" title="Elegir cualquier color">
        <div class="swatches" id="swatches"></div>
      </div>

      <div class="recents-wrap">
        <span class="recents-label">Recientes</span>
        <div class="recents" id="recents"></div>
      </div>

      <div class="recents-wrap">
        <span class="recents-label">Colores en la skin</span>
        <div class="skin-colors" id="skin-colors"></div>
      </div>

      <div class="canvas-wrap">
        <canvas id="editor"></canvas>
      </div>

      <label class="check"><input type="checkbox" id="grid" checked> Cuadrícula</label>

      <div class="layers-wrap">
        <div class="section-head">
          <span class="recents-label">Capas</span>
          <button id="layer-add" class="mini-btn">+ Capa</button>
        </div>
        <div class="layers" id="layers"></div>
      </div>

      <div class="skinbase-wrap">
        <span class="recents-label">Skin base</span>
        <div class="skinbase-row" id="skin-presets">
          <button data-skin="steve">Steve</button>
          <button data-skin="alex" class="active">Alex</button>
        </div>
        <div class="skinbase-actions">
          <button id="skin-upload">Subir la tuya</button>
          <button id="skin-reset">Resetear a la base</button>
        </div>
      </div>
    </aside>

    <main class="viewer-pane">
      <div class="viewer-toolbar">
        <div class="seg" id="model-toggle" title="Ancho de brazos">
          <button data-model="steve">Steve</button>
          <button data-model="alex" class="active">Alex</button>
        </div>
        <label class="check"><input type="checkbox" id="layer-outer" checked> Capa exterior</label>
        <label class="check"><input type="checkbox" id="grid3d"> Cuadrícula 3D</label>
        <label class="check pose-field">Pose
          <select id="pose">
            <option value="reposo">Reposo</option>
            <option value="andar">Andar</option>
            <option value="correr">Correr</option>
            <option value="saludar">Saludar</option>
            <option value="sentado">Sentado</option>
            <option value="tpose">T-pose</option>
          </select>
        </label>
        <div class="parts" id="parts" title="Mostrar/ocultar partes">
          <span class="parts-label">Partes</span>
          <button data-part="head" class="active">Cabeza</button>
          <button data-part="body" class="active">Torso</button>
          <button data-part="leftArm" class="active">Brazo I</button>
          <button data-part="rightArm" class="active">Brazo D</button>
          <button data-part="leftLeg" class="active">Pierna I</button>
          <button data-part="rightLeg" class="active">Pierna D</button>
        </div>
      </div>
      <div id="viewer">
        <div id="ref-panel" hidden>
          <div class="ref-head">
            <span>Referencia · cuentagotas</span>
            <button id="ref-close" title="Quitar imagen">✕</button>
          </div>
          <canvas id="ref-canvas"></canvas>
        </div>
      </div>
    </main>
  </div>

  <div id="drop-overlay" hidden>
    <div class="drop-inner">
      <span class="drop-icon">⬇</span>
      <p>Suelta la skin para cargarla</p>
      <small>PNG · 64×64</small>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
